<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Morita ✨ Patitas Felices</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../perfil.css">
</head>
<body class="perfil-body">
    <main class="perfil-aesthetic-container">
        <section class="aesthetic-card" style="opacity: 0.85;">
            <div class="aesthetic-gallery">
                <img src="https://images.unsplash.com/photo-1533733506639-236caeb0942d?w=800" alt="Morita" class="photo-main">
            </div>
            <div class="aesthetic-info">
                <h1>Morita 🍓</h1>
                <span class="status-tag" style="background: rgba(255,100,100,0.1); color: #ff6464; border: 1px solid rgba(255,100,100,0.2);">Estado: ¡Adoptada! ❤️ ✨</span>
                <div class="aesthetic-characteristics-grid">
                    <span>🌟 <strong>Edad:</strong> 1 año</span>
                    <span>🌸 <strong>Sexo:</strong> Hembra</span>
                    <span>🎀 <strong>Tamaño:</strong> Pequeña</span>
                    <span>💖 <strong>Salud:</strong> Feliz</span>
                </div>
                <h3>Su Historia 📖</h3>
                <p>Morita ya encontró su final feliz. Fue rescatada de un árbol y hoy vive rodeada de juguetes y mucho amor en su nuevo hogar. ✨</p>
                <button class="aesthetic-btn-adopcion" style="background: #ccc; cursor: not-allowed;">¡Ya tengo familia! 🏠</button>
            </div>
        </section>
    </main>
</body>
</html>
